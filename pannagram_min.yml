name: pannagram
channels:
  - bioconda
  - conda-forge
dependencies:
  # --- Python runtime ---
  - python >=3.8
  - pip

  # --- Aligners used by the script ---
  - abpoa
  - mafft
  - famsa

  # --- Existing R stack ---
  - r-base
  - r-devtools
  - r-testthat
  - r-ggplot2
  - r-reshape2
  - r-roxygen2
  - r-foreach
  - r-crayon
  - r-optparse
  - r-doparallel
  - r-stringi
  - r-usethis
  - r-ape
  - r-ggpubr
  - r-pryr
  - r-ggally
  - r-network
  - r-igraph
  - r-sna

  # --- Bioconductor ---
  - bioconductor-rhdf5
  - bioconductor-muscle
  - bioconductor-msa
  - bioconductor-ggtree

  # --- Bio tools ---
  - blast
  - vcftools
  - plink

  # --- System ---
  - parallel
